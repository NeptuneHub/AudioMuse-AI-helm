# Default values for audiomuse-ai.

fullnameOverride: ""
nameOverride: ""

namespace:
  name: "default-audiomuse-ns" # Reverted to a sensible default, or "default"
                                # This is only used if --namespace is NOT specified
                                # during helm install.

timezone: "UTC"   # Sets TZ environment variable in containers

image:
  repository: ghcr.io/neptunehub/audiomuse-ai
  pullPolicy: Always
  # Overrides the image tag whose default is the chart's appVersion.
  tag: ""

flask:
  replicaCount: 1
  service:
    type: LoadBalancer
    port: 8000
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  # nodeSelector: {}

worker:
  replicaCount: 1
  # livenessProbe: {}
  # readinessProbe: {}
  # nodeSelector: {}

redis:
  # nodeSelector: {}
  enabled: true
  external:
    url: ""           # e.g. "redis://my-redis-cluster:6379/0"
  image: "redis:7-alpine"
  service:
    port: 6379
  resources: {}
  # resources:
  #   requests:
  #     cpu: "200m"
  #     memory: "256Mi"
  #   limits:
  #     cpu: "1"
  #     memory: "512Mi"

postgres:
  # nodeSelector: {}
  enabled: true
  external:
    host: ""          # e.g. "audiomuse-postgresql-rw" (CNPG rw service)
    port: 5432
  image: "postgres:15-alpine"
  user: "audiomuse"
  password: "audiomusepassword" # IMPORTANT: Change this for production or use --set
  db: "audiomusedb"
  existingSecret: ""
  existingSecretKeys:
    user: "POSTGRES_USER"
    password: "POSTGRES_PASSWORD"
    db: "POSTGRES_DB"
  service:
    port: 5432
  persistence:
    enabled: true
    size: 5Gi
    # storageClassName: "your-storage-class" # Uncomment and specify if needed
  resources: {}
  # resources:
  #   requests:
  #     cpu: "250m"
  #     memory: "256Mi"
  #   limits:
  #     cpu: "1"
  #     memory: "2Gi"

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false   # app writes to /app/temp_audio
  runAsUser: 0
  runAsGroup: 0
  capabilities:
    drop: ["ALL"]

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: audiomuse.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

serviceAccount:
  create: false
  name: ""
  annotations: {}
